<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Monitor TV</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d0d0d; color: #f2f2f2; font-family: 'Arial', sans-serif; padding: 20px; }
        
        /* Layout Header Minimalis */
        .header-container { max-width: 1200px; margin: 0 auto 40px auto; position: relative; }
        .btn-back-home { position: absolute; left: 0; top: 50%; transform: translateY(-50%); color: #888; text-decoration: none; font-size: 0.9rem; }
        .btn-back-home:hover { color: #fff; }

        /* Card Modern - Tanpa border warna-warni */
        .custom-card { 
            background-color: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 8px; 
            padding: 25px; 
            transition: 0.3s; 
            height: 100%; 
            display: flex;        /* 🔥 TAMBAHKAN INI */
            flex-direction: column; /* 🔥 TAMBAHKAN INI */
        }
        .card-content-wrapper { 
            flex-grow: 1; 
        }
        .custom-card:hover { border-color: #ffc107; }
        
        .card-title-text { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #ffc107; margin-bottom: 25px; }
        
        .form-select { background-color: #262626 !important; color: #fff !important; border: 1px solid #444 !important; border-radius: 4px; padding: 10px; }
        .form-select:focus { border-color: #ffc107 !important; box-shadow: none; }
        
        .btn-action { 
            margin-top: auto;      /* 🔥 TAMBAHKAN INI: Mendorong tombol ke bawah */
            background-color: #262626; 
            color: #ffc107; 
            border: 1px solid #ffc107; 
            padding: 12px; 
            font-weight: bold; 
            width: 100%; 
            border-radius: 4px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: 0.2s; 
        }
        .btn-action:hover { background-color: #ffc107; color: #000; }
    </style>
</head>
<body>

    <div class="container py-4">
        <div class="header-container">
            <a href="index.html" class="btn-back-home">❮ Kembali ke Menu Utama</a>
            <h4 class="text-center fw-bold text-uppercase" style="letter-spacing: 2px;">Portal Monitor TV</h4>
        </div>

        <div class="row g-4 justify-content-center" style="max-width: 1200px; margin: 0 auto;">
            
            <div class="col-md-4">
                <div class="custom-card">
                    <h5 class="card-title-text">Layar Skor Tanding</h5>
                    <select id="selectTanding" class="form-select mb-4">
                        <option value="" disabled selected>-- Pilih Gelanggang --</option>
                        <option value="g1" id="opt_t_g1">Gelanggang 1</option>
                        <option value="g2" id="opt_t_g2">Gelanggang 2</option>
                        <option value="g3" id="opt_t_g3">Gelanggang 3</option>
                        <option value="g4" id="opt_t_g4">Gelanggang 4</option>
                        <option value="g5" id="opt_g5">Gelanggang 5</option>
                        <option value="g6" id="opt_g6">Gelanggang 6</option>
                        <option value="g7" id="opt_g7">Gelanggang 7</option>
                    </select>
                    <button class="btn-action" onclick="bukaLayar('tanding')">Tayangkan</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="custom-card">
                    <h5 class="card-title-text">Layar Skor Seni</h5>
                    <select id="selectSeni" class="form-select mb-4">
                        <option value="" disabled selected>-- Pilih Gelanggang --</option>
                        <option value="g1" id="opt_s_g1">Gelanggang 1</option>
                        <option value="g2" id="opt_s_g2">Gelanggang 2</option>
                        <option value="g3" id="opt_s_g3">Gelanggang 3</option>
                        <option value="g4" id="opt_s_g4">Gelanggang 4</option>
                        <option value="g5" id="opt_s_g5">Gelanggang 5</option>
                        <option value="g6" id="opt_s_g6">Gelanggang 6</option>
                        <option value="g7" id="opt_s_g7">Gelanggang 7</option>
                    </select>
                    <button class="btn-action" onclick="bukaLayar('seni')">Tayangkan</button>
                </div>
            </div>

            <div class="col-md-4">
                <div class="custom-card">
                    <h5 class="card-title-text">Papan Jadwal</h5>
                    <select id="selectJadwalGel" class="form-select mb-2">
                        <option value="g1">Gelanggang 1</option>
                        <option value="g2">Gelanggang 2</option>
                        <option value="g3">Gelanggang 3</option>
                        <option value="g4">Gelanggang 4</option>
                        <option value="g5">Gelanggang 5</option>
                        <option value="g6">Gelanggang 6</option>
                        <option value="g7">Gelanggang 7</option>
                        <option value="semua" class="text-warning">SEMUA GELANGGANG</option>
                    </select>
                    <select id="selectJadwalKat" class="form-select mb-4">
                        <option value="tanding">Kategori Tanding</option>
                        <option value="jurus">Kategori Seni</option>
                    </select>
                    <button class="btn-action" onclick="bukaLayar('jadwal')">Tayangkan</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNsOk8MsIhBoZ44Nd9WGGl6eBJOEKu3nI",
            authDomain: "tesapksilat99.firebaseapp.com",
            databaseURL: "https://tesapksilat99-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tesapksilat99",
            storageBucket: "tesapksilat99.firebasestorage.app",
            messagingSenderId: "747533449255",
            appId: "1:747533449255:web:358edf3c6032c22cdbb602"
        };
        const app = initializeApp(firebaseConfig); 
        const database = getDatabase(app);

        document.addEventListener("DOMContentLoaded", () => {
            for(let i = 1; i <= 7; i++) {
                onValue(ref(database, `pertandingan/g${i}/locks/layar_utama`), (snap) => {
                    let optTanding = document.getElementById(`opt_t_g${i}`);
                    let optSeni = document.getElementById(`opt_s_g${i}`); // 🔥 KABEL 3 TERSAMBUNG
                    let isLocked = snap.exists() && snap.val() === true;
                    
                    if(optTanding) {
                        optTanding.innerText = isLocked ? `Gelanggang ${i} (Sedang Dipakai)` : `Gelanggang ${i} (Tersedia)`;
                        optTanding.disabled = isLocked;
                    }
                    if(optSeni) {
                        optSeni.innerText = isLocked ? `Gelanggang ${i} (Sedang Dipakai)` : `Gelanggang ${i} (Tersedia)`;
                        optSeni.disabled = isLocked;
                    }
                });
            }
        });

        // Logika Pengiriman Parameter Layar TV Pintar (Mendukung APK & Browser Biasa)
window.bukaLayar = function(jenis) {
    if (jenis === 'tanding') {
        let gel = document.getElementById('selectTanding').value;
        if(!gel) { alert("Silakan pilih Gelanggang Tanding!"); return; }
        
        // JIKA DI DALAM APK ANDROID & TV TERHUBUNG (Halaman tersendiri, tablet tidak pindah)
        if (typeof AndroidApp !== "undefined" && AndroidApp.isTvConnected()) {
            AndroidApp.bukaDiTV(gel, "tanding");
        } else {
            // Jika di laptop/browser biasa (Gunakan Mode Extend / Tarik Tab ke Jendela TV)
            window.open(`layar-utama.html?gelanggang=${gel}`, '_blank');
        }
    } 
    else if (jenis === 'seni') {
        let gel = document.getElementById('selectSeni').value;
        if(!gel) { alert("Silakan pilih Gelanggang Seni!"); return; }
        
        if (typeof AndroidApp !== "undefined" && AndroidApp.isTvConnected()) {
            AndroidApp.bukaDiTV(gel, "seni");
        } else {
            window.open(`layar-seni.html?gelanggang=${gel}`, '_blank');
        }
    } 
    else if (jenis === 'jadwal') {
        let gel = document.getElementById('selectJadwalGel').value; // menghasilkan 'g1', 'g2', atau 'semua'
        let kat = document.getElementById('selectJadwalKat').value; // menghasilkan 'tanding' atau 'seni'
        
        if (typeof AndroidApp !== "undefined" && AndroidApp.isTvConnected()) {
            // Sesuai pesanan Mesin APK di jadwal-tv.html, parameter pertama wajib diawali "JADWAL_"
            AndroidApp.bukaDiTV("JADWAL_" + gel, kat);
        } else {
            // Jika di browser laptop biasa, kirim parameter bersih tanpa "JADWAL_" agar select option tidak crash
            window.open(`jadwal-tv.html?gelanggang=${gel}&kategori=${kat}`, '_blank');
        }
    }
}


    </script>
</body>
</html>
