<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pusat Monitor TV - Digital Scoring</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
        }
        
        /* Layout Header Terpadu agar Sejajar & Hemat Ruang */
        .header-container {
            width: 100%;
            max-width: 1400px;
            position: relative;
            margin-bottom: 35px; /* Jarak diperkecil agar konten di bawahnya naik */
        }

        /* Tombol Kembali di Sisi Kiri (Sejajar Judul) */
        .btn-back-home {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888888;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease;
            z-index: 1000;
        }
        .btn-back-home:hover {
            color: #ffffff;
        }

        /* Struktur Kotak Dashboard */
        .custom-card {
            background-color: #181818;
            border-radius: 12px;
            padding: 24px;
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
        }
        
        /* Variasi Warna Border Tipis */
        .border-tanding { border: 1px solid rgba(13, 202, 240, 0.4); }
        .border-seni { border: 1px solid rgba(25, 135, 84, 0.4); }
        .border-jadwal { border: 1px solid rgba(255, 193, 7, 0.4); }

        /* Header Card */
        .card-header-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
        }
        
        /* Teks Judul 1 Baris */
        .card-title-text {
            width: 100%;
            text-align: center;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin: 0;
            padding: 0;
            white-space: nowrap;
        }

        /* Form & Dropdown Custom */
        .form-label {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 6px;
        }
        .form-select {
            background-color: #262626 !important;
            color: #ffffff !important;
            border: 1px solid #3a3a3a !important;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.95rem;
        }
        .form-select:focus {
            box-shadow: none;
        }
        option:disabled {
            color: #555;
            background-color: #1a1a1a;
        }

        /* Button Layout */
        .btn-action {
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-weight: bold;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            width: 100%;
            transition: opacity 0.2s ease;
        }
        .btn-action:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100 py-4">
        
        <div class="header-container">
            <a href="index.html" class="btn-back-home">&lt; kembali ke halaman utama</a>
            <div class="text-center">
                <h2 class="fw-bold text-uppercase tracking-wider m-0" style="font-size: 1.75rem;">🖥️ PORTAL PUSAT MONITOR TV</h2>
                <p class="text-secondary m-0 mt-1" style="color: #666 !important; font-size: 0.9rem;">Semua konfigurasi monitor siap digunakan dalam satu layar</p>
            </div>
        </div>

        <div class="row g-4 w-100 justify-content-center" style="max-width: 1400px;">
            
            <div class="col-xl-4 col-lg-6 d-flex align-items-stretch">
                <div class="custom-card border-tanding d-flex flex-column justify-content-between">
                    <div>
                        <div class="card-header-layout">
                            <h5 class="card-title-text text-info">PORTAL MONITOR TV (TANDING)</h5>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Pilih Gelanggang TV:</label>
                            <select id="selectTanding" class="form-select">
                                <option value="" disabled selected>-- Pilih Gelanggang --</option>
                                <option value="g1" id="opt_t_g1">Gelanggang 1</option>
                                <option value="g2" id="opt_t_g2">Gelanggang 2</option>
                                <option value="g3" id="opt_t_g3">Gelanggang 3</option>
                                <option value="g4" id="opt_t_g4">Gelanggang 4</option>
                                <option value="g5" id="opt_t_g5">Gelanggang 5</option>
                                <option value="g6" id="opt_t_g6">Gelanggang 6</option>
                                <option value="g7" id="opt_t_g7">Gelanggang 7</option>
                            </select>
                        </div>
                    </div>
                    
                    <button class="btn-action bg-info text-dark" onclick="bukaLayar('tanding')">
                        TAYANGKAN KE MONITOR
                    </button>
                </div>
            </div>

            <div class="col-xl-4 col-lg-6 d-flex align-items-stretch">
                <div class="custom-card border-seni d-flex flex-column justify-content-between">
                    <div>
                        <div class="card-header-layout">
                            <h5 class="card-title-text text-success">PORTAL MONITOR TV (SENI / JURUS)</h5>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Pilih Gelanggang TV:</label>
                            <select id="selectSeni" class="form-select">
                                <option value="" disabled selected>-- Pilih Gelanggang --</option>
                                <option value="g1" id="opt_s_g1">Gelanggang 1</option>
                                <option value="g2" id="opt_s_g2">Gelanggang 2</option>
                                <option value="g3" id="opt_s_g3">Gelanggang 3</option>
                                <option value="g4" id="opt_s_g4">Gelanggang 4</option>
                                <option value="g5" id="opt_s_g5">Gelanggang 5</option>
                                <option value="g6" id="opt_s_g6">Gelanggang 6</option>
                                <option value="g7" id="opt_s_g7">Gelanggang 7</option>
                            </select>
                        </div>
                    </div>
                    
                    <button class="btn-action bg-success text-dark" style="background-color: #198754 !important; color: #000 !important;" onclick="bukaLayar('seni')">
                        TAYANGKAN KATEGORI SENI
                    </button>
                </div>
            </div>

            <div class="col-xl-4 col-lg-6 d-flex align-items-stretch">
                <div class="custom-card border-jadwal d-flex flex-column justify-content-between">
                    <div>
                        <div class="card-header-layout">
                            <h5 class="card-title-text text-warning">PENGATURAN LAYAR JADWAL</h5>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">1. Pilih Gelanggang / Matras:</label>
                            <select id="selectJadwalGel" class="form-select">
                                <option value="g1">Gelanggang 1 (Matras 1)</option>
                                <option value="g2">Gelanggang 2 (Matras 2)</option>
                                <option value="g3">Gelanggang 3 (Matras 3)</option>
                                <option value="g4">Gelanggang 4 (Matras 4)</option>
                                <option value="g5">Gelanggang 5 (Matras 5)</option>
                                <option value="g6">Gelanggang 6 (Matras 6)</option>
                                <option value="g7">Gelanggang 7 (Matras 7)</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">2. Pilih Kategori Kompetisi:</label>
                            <select id="selectJadwalKat" class="form-select">
                                <option value="tanding">KATEGORI TANDING</option>
                                <option value="seni">KATEGORI SENI</option>
                            </select>
                        </div>
                    </div>
                    
                    <button class="btn-action bg-warning text-dark" onclick="bukaLayar('jadwal')">
                        TAMPILKAN LAYAR
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNsOk8MsIhBoZ44Nd9WGGl6eBJOEKu3nI",
            authDomain: "tesapksilat99.firebaseapp.com",
            databaseURL: "https://tesapksilat99-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tesapksilat99",
            storageBucket: "tesapksilat99.firebasestorage.app",
            messagingSenderId: "747533449255",
            appId: "1:747533449255:web:358edf3c6032c22cdbb602"
        };
        const app = initializeApp(firebaseConfig); 
        const database = getDatabase(app);

        // Fitur Sync Real-time Status Gelanggang
        document.addEventListener("DOMContentLoaded", () => {
            for(let i = 1; i <= 7; i++) {
                onValue(ref(database, `pertandingan/g${i}/locks/layar_utama`), (snap) => {
                    let optTanding = document.getElementById(`opt_t_g${i}`);
                    if(optTanding) {
                        if(snap.exists() && snap.val() === true) {
                            optTanding.innerText = `Gelanggang ${i} (Sedang Dipakai)`;
                            optTanding.disabled = true;
                        } else {
                            optTanding.innerText = `Gelanggang ${i} (Tersedia)`;
                            optTanding.disabled = false;
                        }
                    }
                });
            }
        });

        // Logika Pengiriman Parameter Layar TV Pintar (Mendukung APK & Browser Biasa)
window.bukaLayar = function(jenis) {
    if (jenis === 'tanding') {
        let gel = document.getElementById('selectTanding').value;
        if(!gel) { alert("Silakan pilih Gelanggang Tanding!"); return; }
        
        // JIKA DI DALAM APK ANDROID & TV TERHUBUNG (Halaman tersendiri, tablet tidak pindah)
        if (typeof AndroidApp !== "undefined" && AndroidApp.isTvConnected()) {
            AndroidApp.bukaDiTV(gel, "tanding");
        } else {
            // Jika di laptop/browser biasa (Gunakan Mode Extend / Tarik Tab ke Jendela TV)
            window.open(`layar-utama.html?gelanggang=${gel}`, '_blank');
        }
    } 
    else if (jenis === 'seni') {
        let gel = document.getElementById('selectSeni').value;
        if(!gel) { alert("Silakan pilih Gelanggang Seni!"); return; }
        
        if (typeof AndroidApp !== "undefined" && AndroidApp.isTvConnected()) {
            AndroidApp.bukaDiTV(gel, "seni");
        } else {
            window.open(`layar-seni.html?gelanggang=${gel}`, '_blank');
        }
    } 
    else if (jenis === 'jadwal') {
        let gel = document.getElementById('selectJadwalGel').value; // menghasilkan 'g1', 'g2', atau 'semua'
        let kat = document.getElementById('selectJadwalKat').value; // menghasilkan 'tanding' atau 'seni'
        
        if (typeof AndroidApp !== "undefined" && AndroidApp.isTvConnected()) {
            // Sesuai pesanan Mesin APK di jadwal-tv.html, parameter pertama wajib diawali "JADWAL_"
            AndroidApp.bukaDiTV("JADWAL_" + gel, kat);
        } else {
            // Jika di browser laptop biasa, kirim parameter bersih tanpa "JADWAL_" agar select option tidak crash
            window.open(`jadwal-tv.html?gelanggang=${gel}&kategori=${kat}`, '_blank');
        }
    }
}
    </script>
</body>
</html>
