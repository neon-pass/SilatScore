<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juri Seni Tunggal - 2025</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(180deg, #222 0%, #000 100%); color: #fff; min-height: 100vh; user-select: none; font-family: 'Arial', sans-serif; }
        .header-box { background-color: #111; border-bottom: 2px solid #ffc107; padding: 10px; text-align: center; }
        .nama-pesilat { font-size: 24px; font-weight: bold; color: #0dcaf0; }
        .asal-kontingen { font-size: 14px; color: #aaa; letter-spacing: 2px; text-transform: uppercase; }
        .skor-utama { font-size: 90px; font-weight: bold; color: #fff; text-shadow: 0px 4px 10px rgba(255,255,255,0.2); text-align: center; margin: 20px 0; line-height: 1; }
        
        .btn-kesalahan { height: 80px; font-size: 18px; font-weight: bold; border-radius: 12px; margin-bottom: 15px; width: 100%; box-shadow: 0px 4px 6px rgba(0,0,0,0.5); transition: 0.1s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-kesalahan:active { transform: scale(0.95); background-color: #dc3545 !important; color: white !important; }
        .badge-minus { background: #fff; color: #dc3545; font-size: 14px; padding: 2px 8px; border-radius: 10px; margin-top: 5px; font-weight: 900; }
        
        .btn-undo { background: #333; color: #ffc107; border: 1px solid #555; height: 50px; font-weight: bold; font-size: 16px; border-radius: 8px; }
        .btn-undo:active { background: #ffc107; color: #000; }
        .log-box { background: #111; border: 1px solid #333; height: 100px; border-radius: 8px; padding: 10px; overflow-y: auto; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="header-box">
    <div class="text-warning fw-bold mb-1" style="font-size: 12px;">JURI 1 - SENI TUNGGAL PUTRA</div>
    <div class="nama-pesilat" id="namaAtlet">NAMA PESILAT</div>
    <div class="asal-kontingen" id="kontingenAtlet">KONTINGEN DAERAH</div>
</div>

<div class="container mt-3">
    <!-- DISPLAY SKOR -->
    <div class="skor-utama" id="displaySkor">10.00</div>
    
    <div class="row px-2">
        <!-- TOMBOL PENGURANGAN 0.01 -->
        <div class="col-6 pe-1">
            <button class="btn btn-outline-danger btn-kesalahan" onclick="potongNilai('Rincian Gerak')">
                RINCIAN GERAK <span class="badge-minus">- 0.01</span>
            </button>
            <button class="btn btn-outline-danger btn-kesalahan" onclick="potongNilai('Gerak Tertinggal')">
                TERTINGGAL <span class="badge-minus">- 0.01</span>
            </button>
        </div>
        <div class="col-6 ps-1">
            <button class="btn btn-outline-danger btn-kesalahan" onclick="potongNilai('Urutan Gerak')">
                URUTAN GERAK <span class="badge-minus">- 0.01</span>
            </button>
            <button class="btn btn-outline-warning btn-kesalahan text-warning" onclick="potongNilai('Senjata Terlepas')">
                SENJATA TERLEPAS <span class="badge-minus text-warning">- 0.01</span>
            </button>
        </div>
    </div>

    <!-- UNDO & RIWAYAT -->
    <div class="row mt-2 px-2">
        <div class="col-4 pe-1">
            <button class="btn btn-undo w-100" onclick="undoNilai()">↩ UNDO</button>
        </div>
        <div class="col-8 ps-1">
            <div class="log-box" id="logKesalahan">
                <div class="text-center mt-3">Belum ada pemotongan...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // Logika Lokal Sementara (Nanti disambung ke Firebase)
    let skorAwal = 10.00;
    let totalPotongan = 0;
    let riwayatPotongan = [];

    function updateLayar() {
        let skorAkhir = (skorAwal - (totalPotongan * 0.01)).toFixed(2);
        // Pastikan tidak turun di bawah 9.00 sesuai aturan 2025
        if (skorAkhir < 9.00) skorAkhir = 9.00; 
        
        document.getElementById('displaySkor').innerText = skorAkhir;

        let logHtml = "";
        if (riwayatPotongan.length === 0) {
            logHtml = "<div class='text-center mt-3'>Belum ada pemotongan...</div>";
        } else {
            riwayatPotongan.forEach((item, index) => {
                logHtml += `<div>❌ ${item} (-0.01)</div>`;
            });
        }
        document.getElementById('logKesalahan').innerHTML = logHtml;
    }

    function potongNilai(jenisKesalahan) {
        // Aturan 2025: Skala 9.00 hingga 10.00
        if (skorAwal - ((totalPotongan + 1) * 0.01) < 9.00) return; 
        
        totalPotongan++;
        riwayatPotongan.push(jenisKesalahan);
        updateLayar();
        
        // TODO: Kirim data totalPotongan ke Firebase /seni/g1/juri1/
    }

    function undoNilai() {
        if (totalPotongan > 0) {
            totalPotongan--;
            riwayatPotongan.pop();
            updateLayar();
        }
    }
</script>
</body>
</html>
