<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Menu Utama - Digital Pencak Silat</title>
    
    <!-- FontAwesome untuk Icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* FONT & LAYOUT DASAR */
        body {
            background-color: #050505;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            margin: 0;
            user-select: none;
            touch-action: manipulation;
            overflow: hidden; /* Dikunci dulu sebelum voucer valid */
        }
        
        /* CONTAINER UTAMA (Disembunyikan awalnya) */
        .menu-container {
            width: 85%;
            max-width: 400px;
            text-align: center;
            padding: 40px 20px;
            display: none; /* Disembunyikan oleh sistem gembok */
        }
        
        /* TYPOGRAPHY MEWAH */
        .app-title {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
            font-size: 32px;
            letter-spacing: 6px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }
        
        .app-subtitle {
            color: #888888;
            font-size: 11px;
            margin-bottom: 50px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        
        /* TOMBOL MEWAH */
        .btn-luxury {
            display: block;
            width: 100%;
            padding: 22px 0;
            margin-bottom: 20px;
            background-color: #0a0a0a;
            border: 1px solid #bf953f;
            color: #fcf6ba;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-decoration: none;
            border-radius: 4px; 
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.8);
            transition: all 0.15s ease-in-out;
            cursor: pointer;
        }
        
        .btn-luxury:active {
            transform: scale(0.96);
            background: linear-gradient(to right, #bf953f, #b38728); 
            color: #000000; 
            border-color: #fcf6ba;
            box-shadow: 0px 5px 15px rgba(191, 149, 63, 0.3);
        }
        
        .footer-text {
            margin-top: 50px;
            color: #444444;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ========================================= */
        /* CSS KHUSUS SISTEM GEMBOK VOUCER           */
        /* ========================================= */
        #voucherOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-color: #050505; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .lock-box {
            width: 85%; max-width: 350px; text-align: center;
            border: 1px solid #bf953f; padding: 30px 20px; border-radius: 8px;
            background-color: #0a0a0a; box-shadow: 0px 10px 30px rgba(191, 149, 63, 0.1);
        }
        .input-luxury {
            width: 100%; padding: 15px 0; margin-bottom: 20px;
            background-color: #000; border: 1px solid #444; color: #fff;
            text-align: center; font-size: 18px; font-weight: bold; letter-spacing: 4px;
            outline: none; border-radius: 4px;
        }
        .input-luxury:focus { border-color: #bf953f; }
        
        #timerContainer {
            position: fixed; top: 15px; right: 15px; 
            background: linear-gradient(to right, #bf953f, #b38728);
            color: #000; padding: 8px 15px; border-radius: 4px;
            font-size: 12px; font-weight: 900; letter-spacing: 2px;
            z-index: 9998; box-shadow: 0 4px 10px rgba(0,0,0,0.5); display: none;
        }
    </style>
</head>
<body>

    <!-- ==================================================== -->
    <!-- LAYER 1: SISTEM GEMBOK (LOCK SCREEN)                 -->
    <!-- ==================================================== -->
    <div id="voucherOverlay">
        <div class="lock-box">
            <i class="fa-solid fa-shield-halved fa-3x mb-3" style="color: #bf953f; margin-bottom: 20px;"></i>
            <h2 class="app-title" style="font-size: 20px;">AKTIVASI VIP</h2>
            <div class="app-subtitle" style="margin-bottom: 30px;">Masukkan Kode Akses</div>
            
            <input type="text" id="inputVoucer" class="input-luxury" placeholder="KODE VOUCER">
            <button id="btnSubmitVoucer" class="btn-luxury" style="padding: 15px 0; font-size: 14px;">Buka Akses</button>
            
            <div id="pesanVoucer" style="color: #ff4d4d; font-size: 12px; font-weight: bold; margin-top: 15px; min-height: 15px;"></div>
        </div>
    </div>

    <!-- WIDGET TIMER -->
    <div id="timerContainer"><i class="fa-solid fa-clock"></i> <span id="teksTimer">00:00:00</span></div>

    <!-- ==================================================== -->
    <!-- LAYER 2: MENU UTAMA (Akan muncul jika voucer valid)  -->
    <!-- ==================================================== -->
    <div class="menu-container" id="mainMenu">
        
        <h1 class="app-title">DIGITAL SILAT</h1>
        <div class="app-subtitle">Sistem Validasi IPSI</div>

        <a href="monitor.html" class="btn-luxury">MONITOR TV</a>
        <a href="layar-juri.html" class="btn-luxury">TANDING</a>
        <a href="layar-juri-seni.html" class="btn-luxury">JURUS</a>
        <a href="panitia.html" class="btn-luxury">SEKRETARIS</a>
        <a href="pengaturan.html" class="btn-luxury">PENGATURAN</a>
        
        <div class="footer-text">
            v1.0 &bull; Dunia Event Indo
        </div>

    </div>

    <!-- ==================================================== -->
    <!-- SCRIPT LOGIKA FIREBASE (REALTIME DATABASE) & TIMER   -->
    <!-- ==================================================== -->
    <!-- Load Firebase SDK untuk Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <script>
        // Konfigurasi Asli Milikmu
        const firebaseConfig = {
            apiKey: "AIzaSyCNsOk8MsIhBoZ44Nd9WGGl6eBJOEKu3nI",
            authDomain: "tesapksilat99.firebaseapp.com",
            databaseURL: "https://tesapksilat99-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tesapksilat99",
            storageBucket: "tesapksilat99.firebasestorage.app",
            messagingSenderId: "747533449255",
            appId: "1:747533449255:web:358edf3c6032c22cdbb602"
        };
        
        // Inisialisasi Firebase Realtime Database
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Variabel UI
        const overlay = document.getElementById('voucherOverlay');
        const mainMenu = document.getElementById('mainMenu');
        const btnSubmit = document.getElementById('btnSubmitVoucer');
        const pesan = document.getElementById('pesanVoucer');
        const timerUI = document.getElementById('timerContainer');
        const teksTimer = document.getElementById('teksTimer');
        let timerInterval;

        function cekSesi() {
            const batasWaktu = localStorage.getItem('batas_waktu_voucer');
            const kodeAktif = localStorage.getItem('kode_voucer_aktif');
            const sekarang = new Date().getTime();

            if (batasWaktu && sekarang < parseInt(batasWaktu)) {
                overlay.style.display = 'none';
                mainMenu.style.display = 'block';
                timerUI.style.display = 'block';
                document.body.style.overflow = 'auto';
                jalankanTimer();

                // --- FITUR TENDANG PAKSA (CCTV FIREBASE) ---
                if (kodeAktif) {
                    db.ref('vouchers/' + kodeAktif).on('value', (snapshot) => {
                        // Jika data tiba-tiba hilang/dihapus dari Firebase
                        if (!snapshot.exists()) {
                            localStorage.removeItem('batas_waktu_voucer');
                            localStorage.removeItem('kode_voucer_aktif');
                            window.location.reload(); // Tendang kembali ke gembok
                        }
                    });
                }
                // -------------------------------------------

            } else {
                localStorage.removeItem('batas_waktu_voucer');
                localStorage.removeItem('kode_voucer_aktif');
                overlay.style.display = 'flex';
                mainMenu.style.display = 'none';
                if(batasWaktu) pesan.innerText = "Masa aktif telah habis.";
            }
        }

        // Logika Timer Hitung Mundur (Tanpa Popup)
        function jalankanTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const batas = parseInt(localStorage.getItem('batas_waktu_voucer'));
                const sisa = batas - new Date().getTime();

                if (sisa <= 0) {
                    clearInterval(timerInterval);
                    localStorage.removeItem('batas_waktu_voucer');
                    // Langsung refresh halaman (gembok otomatis tertutup)
                    window.location.reload(); 
                } else {
                    let hari = Math.floor(sisa / (1000 * 60 * 60 * 24));
                    let jam = Math.floor((sisa % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    let menit = Math.floor((sisa % (1000 * 60 * 60)) / (1000 * 60));
                    let detik = Math.floor((sisa % (1000 * 60)) / 1000);
                    
                    let jamStr = jam < 10 ? "0" + jam : jam;
                    let menitStr = menit < 10 ? "0" + menit : menit;
                    let detikStr = detik < 10 ? "0" + detik : detik;
                    
                    let teksHari = hari > 0 ? `${hari} Hari, ` : "";
                    teksTimer.innerText = `${teksHari}${jamStr}:${menitStr}:${detikStr}`;
                }
            }, 1000);
        }

        // Proses Tombol Aktivasi (Mendukung input huruf kecil & besar)
        btnSubmit.addEventListener('click', async () => {
            // .toUpperCase() otomatis mengubah huruf kecil jadi besar
            const kode = document.getElementById('inputVoucer').value.trim();
            
            if (!kode) {
                pesan.innerText = "KODE TIDAK BOLEH KOSONG!";
                return;
            }

            btnSubmit.innerText = "MEMERIKSA...";
            btnSubmit.disabled = true;
            pesan.innerText = "";

            try {
                const dbRef = db.ref('vouchers/' + kode);
                const snapshot = await dbRef.once('value');

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    const sekarang = new Date().getTime();

                    if (!data.waktu_kedaluwarsa) {
                        // KATA "durasi_hari" SUDAH DIGANTI MENJADI "durasi"
                        const milidetik = parseFloat(data.durasi) * 86400000;
                        const batas = sekarang + milidetik;
                        
                        await dbRef.update({ waktu_kedaluwarsa: batas });
                        localStorage.setItem('batas_waktu_voucer', batas.toString());
                        localStorage.setItem('kode_voucer_aktif', kode);
                        
                        cekSesi(); 
                    } 
                    else {
                        if (sekarang < data.waktu_kedaluwarsa) {
                            localStorage.setItem('batas_waktu_voucer', data.waktu_kedaluwarsa.toString());
                            localStorage.setItem('kode_voucer_aktif', kode);
                            cekSesi(); 
                        } else {
                            pesan.innerText = "MASA AKTIF VOUCER SUDAH HABIS!";
                        }
                    }
                } else {
                    pesan.innerText = "KODE VOUCER TIDAK VALID!";
                }
            } catch (error) {
                console.error(error);
                pesan.innerText = "GAGAL KONEKSI KE SERVER!";
            } finally {
                btnSubmit.innerText = "BUKA AKSES";
                btnSubmit.disabled = false;
            }
        });

        
        cekSesi();
    </script>
</body>
</html>
